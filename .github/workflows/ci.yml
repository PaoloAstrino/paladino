name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5.16-community
        env:
          NEO4J_AUTH: neo4j/paladino123
          NEO4J_server_memory_heap_initial__size: 2G
          NEO4J_server_memory_heap_max__size: 2G
          NEO4J_server_memory_pagecache_size: 2G
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p paladino123 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint with ruff
      run: |
        ruff check .

    - name: Check formatting with black
      run: |
        black --check .

    - name: Type check with mypy
      run: |
        mypy paladino --ignore-missing-imports

    - name: Initialize schema
      run: |
        python scripts/init_schema.py
      env:
        NEO4J_URI: bolt://localhost:7687
        NEO4J_USER: neo4j
        NEO4J_PASSWORD: paladino123

    - name: Run tests
      run: |
        pytest --cov=paladino --cov-report=xml --cov-report=term
      env:
        NEO4J_URI: bolt://localhost:7687
        NEO4J_USER: neo4j
        NEO4J_PASSWORD: paladino123

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
